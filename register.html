<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Регистрация | ServerHost</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><link rel="stylesheet" href="styles.css"></head>
<body>
  <div class="auth-page"><div class="auth-container"><button class="back-button auth-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> На главную</button><div class="logo"><i class="fas fa-cloud-upload-alt"></i><span>Server<span class="accent">Host</span></span></div><h2>Создать аккаунт</h2><form id="registerForm"><input type="text" id="regName" placeholder="Имя" required><input type="email" id="regEmail" placeholder="Email" required><input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)" required><button type="submit" class="btn btn-primary full-width">Зарегистрироваться</button><p id="regError" class="error-msg"></p></form><p>Уже есть аккаунт? <a href="login.html">Войти</a></p><a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> На главную</a></div></div>
  <script src="script.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', (e) => { e.preventDefault(); const name = document.getElementById('regName').value.trim(); const email = document.getElementById('regEmail').value.trim(); const pwd = document.getElementById('regPassword').value; const errorSpan = document.getElementById('regError'); if(!name || !email || pwd.length < 4) { errorSpan.innerText = 'Заполните все поля (пароль ≥4 символов)'; return; } let users = JSON.parse(localStorage.getItem('users') || '[]'); if(users.some(u => u.email === email)) { errorSpan.innerText = 'Email уже зарегистрирован'; return; } const newUser = { id: Date.now(), name, email, password: pwd }; users.push(newUser); localStorage.setItem('users', JSON.stringify(users)); sessionStorage.setItem('currentUser', JSON.stringify({ id: newUser.id, name, email })); window.location.href = 'index.html'; });
  </script>
</body>
