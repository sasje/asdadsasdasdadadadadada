<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServerHost | Контакты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="main-header">...</header>
  <main>
    <section class="page-header">
      <div class="container">
        <button class="back-button" onclick="history.back()"><i class="fas fa-arrow-left"></i> Назад</button>
        <h1>Свяжитесь с нами</h1>
        <p>Техподдержка 24/7, готовы помочь с выбором</p>
      </div>
    </section>
    <section class="contact-section">
      <div class="container contact-grid">
        <div class="contact-info">
          <div class="contact-card"><i class="fas fa-map-marker-alt"></i><h3>Офис</h3><p>Москва, ул. Правды, д. 24</p></div>
          <div class="contact-card"><i class="fas fa-phone-alt"></i><h3>Телефон</h3><p>+7 (495) 123-45-67</p></div>
          <div class="contact-card"><i class="fas fa-envelope"></i><h3>E-mail</h3><p>support@serverhost.com</p><p>sales@serverhost.com</p></div>
        </div>
        <form class="contact-form" id="contactForm"><h3>Написать нам</h3><input type="text" placeholder="Ваше имя" required><input type="email" placeholder="Email" required><textarea rows="5" placeholder="Сообщение"></textarea><button type="submit" class="btn btn-primary">Отправить</button><p class="form-message"></p></form>
      </div>
    </section>
  </main>
  <footer class="main-footer">...</footer>
  <script src="script.js"></script>
  <script>
    document.getElementById('contactForm')?.addEventListener('submit', (e) => { e.preventDefault(); e.target.querySelector('.form-message').innerText = 'Спасибо! Мы свяжемся с вами.'; setTimeout(() => e.target.reset(), 2000); });
  </script>
</body>
</html>
